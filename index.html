<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerospace Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .hero {
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                             url('https://picsum.photos/id/1015/1920/1080');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- Hero Section z Starshipem -->
    <section class="hero">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-6xl md:text-7xl font-bold tracking-tight mb-6">
                AEROSPACE<br>ENGINEERING
            </h1>
            <p class="text-2xl md:text-3xl text-zinc-400 mb-8">
                Starship • Raptor • Space Exploration
            </p>
            <div class="flex justify-center gap-6">
                <a href="#about" 
                   class="px-8 py-4 bg-white text-black font-semibold rounded-full hover:bg-gray-200 transition">
                    Learn More
                </a>
            </div>
        </div>
    </section>

    <!-- Prosta sekcja poniżej -->
    <section id="about" class="py-20 bg-zinc-900">
        <div class="max-w-3xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-semibold mb-6">Building the Future of Space Travel</h2>
            <p class="text-lg text-zinc-400">
                Passionate aerospace engineer focused on reusable launch vehicles, 
                propulsion systems and making humanity multi-planetary.
            </p>
        </div>
    </section>

</body>
</html>
